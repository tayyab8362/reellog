<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReelLog — YouTube Archiver</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class'}</script>
<style>
  body{background:#0f1117;color:#e2e8f0;font-family:'Inter',system-ui,sans-serif;}
  .card{background:#1a1d27;border:1px solid #2d3148;}
  .btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);transition:opacity .2s;}
  .btn-primary:hover{opacity:.85;}
  .btn-secondary{background:#2d3148;border:1px solid #3d4168;}
  .btn-secondary:hover{background:#3d4168;}
  .btn-danger{background:#7f1d1d;border:1px solid #991b1b;}
  .btn-danger:hover{background:#991b1b;}
  .tab-active{border-bottom:2px solid #6366f1;color:#a5b4fc;}
  .tab-inactive{color:#64748b;border-bottom:2px solid transparent;}
  .log-line{font-family:'JetBrains Mono','Fira Code',monospace;font-size:12px;line-height:1.6;}
  .log-line.info{color:#94a3b8;}
  .log-line.success{color:#4ade80;}
  .log-line.warn{color:#fbbf24;}
  .log-line.error{color:#f87171;}
  .log-line.done{color:#818cf8;font-weight:bold;}
  input[type=text],input[type=number],select{
    background:#0f1117;border:1px solid #2d3148;color:#e2e8f0;
    border-radius:8px;padding:10px 14px;width:100%;outline:none;
    transition:border-color .2s;
  }
  input:focus,select:focus{border-color:#6366f1;}
  .toggle{cursor:pointer;user-select:none;}
  .toggle input{display:none;}
  .toggle-bg{width:44px;height:24px;background:#2d3148;border-radius:12px;position:relative;transition:background .2s;}
  .toggle input:checked~.toggle-bg{background:#6366f1;}
  .toggle-dot{width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:transform .2s;}
  .toggle input:checked~.toggle-bg .toggle-dot{transform:translateX(20px);}
  .file-row:hover{background:#1e2235;}
  .pill{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;}
  .pill-md{background:#1e3a5f;color:#60a5fa;}
  .pill-jpg{background:#3b2a1a;color:#fb923c;}
  .pill-mp4{background:#1a2e1a;color:#4ade80;}
  .pill-mp3{background:#2e1a2e;color:#c084fc;}
  #playlist-modal{display:none;}
  #playlist-modal.open{display:flex;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:#0f1117;}
  ::-webkit-scrollbar-thumb{background:#2d3148;border-radius:3px;}
</style>
</head>
<body class="min-h-screen">

<!-- Header -->
<header class="border-b border-[#2d3148] px-6 py-4 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 rounded-lg btn-primary flex items-center justify-center text-white font-bold text-sm">R</div>
    <span class="text-lg font-bold text-white tracking-tight">ReelLog</span>
    <span class="text-xs text-slate-500 ml-1">YouTube Archiver</span>
  </div>
  <div class="flex gap-2">
    <button onclick="showTab('outputs')" class="text-xs btn-secondary px-3 py-1.5 rounded-lg">📁 Outputs</button>
  </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-8 space-y-6">

  <!-- URL Input -->
  <div class="card rounded-2xl p-6 space-y-4">
    <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">YouTube URL</h2>
    <input type="text" id="url-input"
      placeholder="https://www.youtube.com/@channel  or  /watch?v=VIDEO_ID  or  /playlist?list=..."
      class="text-sm"/>
    <div class="flex gap-2 flex-wrap">
      <button onclick="detectUrl()" class="btn-secondary text-xs px-3 py-1.5 rounded-lg text-slate-300">🔍 Detect Type</button>
      <span id="url-type-badge" class="pill hidden"></span>
    </div>
  </div>

  <!-- Mode Tabs -->
  <div class="card rounded-2xl overflow-hidden">
    <div class="flex border-b border-[#2d3148]">
      <button onclick="setMode('transcript')" id="tab-transcript"
        class="tab-active px-6 py-3 text-sm font-medium transition-colors">
        📝 Transcript + Screenshots
      </button>
      <button onclick="setMode('download')" id="tab-download"
        class="tab-inactive px-6 py-3 text-sm font-medium transition-colors">
        ⬇️ Download Videos
      </button>
    </div>

    <!-- Transcript Panel -->
    <div id="panel-transcript" class="p-6 space-y-5">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-xs text-slate-400 block mb-1.5">Target</label>
          <select id="t-target">
            <option value="channel">Full Channel</option>
            <option value="video">Single Video</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-slate-400 block mb-1.5">Language</label>
          <select id="t-lang">
            <option value="en">English</option>
            <option value="ur">Urdu</option>
            <option value="hi">Hindi</option>
            <option value="ar">Arabic</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="ja">Japanese</option>
            <option value="zh">Chinese</option>
            <option value="es">Spanish</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-slate-400 block mb-1.5">Browser (for cookies)</label>
          <select id="t-browser">
            <option value="chrome">Chrome</option>
            <option value="firefox">Firefox</option>
            <option value="safari">Safari</option>
            <option value="edge">Edge</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-slate-400 block mb-1.5">Whisper Model</label>
          <select id="t-whisper-model">
            <option value="base">base (fast)</option>
            <option value="small">small (balanced)</option>
            <option value="medium">medium</option>
            <option value="large">large (best)</option>
            <option value="tiny">tiny (fastest)</option>
          </select>
        </div>
      </div>
      <div class="flex flex-wrap gap-6 pt-1">
        <label class="toggle flex items-center gap-3">
          <input type="checkbox" id="t-screenshots" checked/>
          <div class="toggle-bg"><div class="toggle-dot"></div></div>
          <span class="text-sm text-slate-300">Capture Screenshots</span>
        </label>
        <label class="toggle flex items-center gap-3">
          <input type="checkbox" id="t-no-whisper"/>
          <div class="toggle-bg"><div class="toggle-dot"></div></div>
          <span class="text-sm text-slate-300">Skip Whisper Fallback</span>
        </label>
      </div>
      <div id="t-threshold-row" class="flex items-center gap-4">
        <label class="text-xs text-slate-400 whitespace-nowrap">Scene Threshold</label>
        <input type="range" id="t-threshold" min="0.01" max="0.5" step="0.01" value="0.02"
          class="flex-1 accent-indigo-500" oninput="document.getElementById('t-threshold-val').textContent=this.value"/>
        <span id="t-threshold-val" class="text-xs text-indigo-400 w-8">0.02</span>
        <span class="text-xs text-slate-500">(lower = more frames)</span>
      </div>
      <button onclick="runTranscript()" class="btn-primary w-full py-3 rounded-xl text-sm font-semibold text-white">
        ▶ Run Archiver
      </button>
    </div>

    <!-- Download Panel -->
    <div id="panel-download" class="p-6 space-y-5 hidden">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-xs text-slate-400 block mb-1.5">Target</label>
          <select id="d-target" onchange="onDownloadTargetChange()">
            <option value="channel">Full Channel (pick playlists)</option>
            <option value="video">Single Video</option>
            <option value="playlist">Direct Playlist URL</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-slate-400 block mb-1.5">Format</label>
          <select id="d-format">
            <option value="video">Video (MP4)</option>
            <option value="mp3">Audio MP3</option>
            <option value="m4a">Audio M4A</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-slate-400 block mb-1.5">Max Quality</label>
          <select id="d-quality">
            <option value="">Best Available</option>
            <option value="2160">4K (2160p)</option>
            <option value="1080">1080p</option>
            <option value="720">720p</option>
            <option value="480">480p</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-slate-400 block mb-1.5">Browser (for cookies)</label>
          <select id="d-browser">
            <option value="chrome">Chrome</option>
            <option value="firefox">Firefox</option>
            <option value="safari">Safari</option>
            <option value="edge">Edge</option>
          </select>
        </div>
      </div>
      <div id="d-playlist-section" class="space-y-3">
        <button onclick="fetchPlaylists()" class="btn-secondary w-full py-2.5 rounded-xl text-sm font-medium text-slate-300">
          🔍 Fetch Playlists from Channel
        </button>
        <div id="d-playlist-list" class="hidden space-y-2 max-h-56 overflow-y-auto pr-1"></div>
      </div>
      <button onclick="runDownload()" class="btn-primary w-full py-3 rounded-xl text-sm font-semibold text-white">
        ⬇ Start Download
      </button>
    </div>
  </div>

  <!-- Live Log -->
  <div id="log-section" class="card rounded-2xl overflow-hidden hidden">
    <div class="flex items-center justify-between px-5 py-3 border-b border-[#2d3148]">
      <div class="flex items-center gap-3">
        <div id="log-spinner" class="w-2 h-2 rounded-full bg-indigo-400 animate-pulse"></div>
        <span class="text-sm font-medium text-slate-300" id="log-title">Running...</span>
      </div>
      <button onclick="cancelJob()" id="cancel-btn"
        class="btn-danger text-xs px-3 py-1.5 rounded-lg text-red-200">✕ Cancel</button>
    </div>
    <div id="log-output"
      class="p-4 h-72 overflow-y-auto space-y-0.5 font-mono text-xs bg-[#0a0c12]"></div>
  </div>

  <!-- Outputs Browser -->
  <div id="outputs-section" class="card rounded-2xl overflow-hidden hidden">
    <div class="flex items-center justify-between px-5 py-3 border-b border-[#2d3148]">
      <span class="text-sm font-semibold text-slate-300">📁 Output Files</span>
      <div class="flex gap-2">
        <button onclick="loadOutputs('output')" class="btn-secondary text-xs px-3 py-1.5 rounded-lg">Transcripts</button>
        <button onclick="loadOutputs('downloads')" class="btn-secondary text-xs px-3 py-1.5 rounded-lg">Downloads</button>
        <button onclick="document.getElementById('outputs-section').classList.add('hidden')"
          class="text-slate-500 hover:text-slate-300 text-xs px-2">✕</button>
      </div>
    </div>
    <div id="outputs-list" class="divide-y divide-[#1e2235] max-h-96 overflow-y-auto"></div>
  </div>

</main>

<!-- Playlist Modal -->
<div id="playlist-modal"
  class="fixed inset-0 bg-black/70 z-50 items-center justify-center p-4">
  <div class="card rounded-2xl w-full max-w-lg p-6 space-y-4">
    <div class="flex items-center justify-between">
      <h3 class="font-semibold text-white">Select Playlists to Download</h3>
      <button onclick="closePlModal()" class="text-slate-500 hover:text-white">✕</button>
    </div>
    <div id="pl-modal-list" class="space-y-2 max-h-80 overflow-y-auto pr-1"></div>
    <div class="flex gap-3 pt-2">
      <button onclick="selectAllPl()" class="btn-secondary flex-1 py-2 rounded-xl text-sm">Select All</button>
      <button onclick="confirmPlDownload()" class="btn-primary flex-1 py-2 rounded-xl text-sm font-semibold text-white">
        ⬇ Download Selected
      </button>
    </div>
  </div>
</div>

<script>
// ── state ────────────────────────────────────────────────────────────────── //
let currentMode = 'transcript';
let currentJobId = null;
let currentEvt = null;
let fetchedPlaylists = [];
let selectedPlaylists = [];

// ── tabs ─────────────────────────────────────────────────────────────────── //
function setMode(m) {
  currentMode = m;
  ['transcript','download'].forEach(t => {
    document.getElementById('tab-'+t).className =
      (t===m ? 'tab-active' : 'tab-inactive') +
      ' px-6 py-3 text-sm font-medium transition-colors';
    document.getElementById('panel-'+t).classList.toggle('hidden', t!==m);
  });
}

// ── url detection ────────────────────────────────────────────────────────── //
function detectUrl() {
  const url = document.getElementById('url-input').value.trim();
  const badge = document.getElementById('url-type-badge');
  if (!url) return;
  let type='', cls='';
  if (/watch\?v=/.test(url))          { type='Single Video'; cls='bg-indigo-900 text-indigo-300'; }
  else if (/playlist\?list=/.test(url)){ type='Playlist';     cls='bg-purple-900 text-purple-300'; }
  else if (/@|\/channel\/|\/c\//.test(url)) { type='Channel'; cls='bg-emerald-900 text-emerald-300'; }
  else                                 { type='Unknown';      cls='bg-slate-700 text-slate-300'; }
  badge.className = 'pill ' + cls;
  badge.textContent = type;
  badge.classList.remove('hidden');
}

function onDownloadTargetChange() {
  const t = document.getElementById('d-target').value;
  document.getElementById('d-playlist-section').classList.toggle('hidden', t !== 'channel');
}

// ── screenshot toggle ────────────────────────────────────────────────────── //
document.getElementById('t-screenshots').addEventListener('change', function() {
  document.getElementById('t-threshold-row').classList.toggle('opacity-40', !this.checked);
  document.getElementById('t-threshold').disabled = !this.checked;
});

// ── log helpers ──────────────────────────────────────────────────────────── //
function appendLog(text, cls='info') {
  const box = document.getElementById('log-output');
  const d = document.createElement('div');
  d.className = 'log-line ' + cls;
  d.textContent = text;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

function classifyLog(line) {
  if (/error|fail|FAIL/i.test(line)) return 'error';
  if (/warn|skip/i.test(line))       return 'warn';
  if (/done|complete|✓/i.test(line)) return 'success';
  return 'info';
}

function startStream(jobId, title) {
  currentJobId = jobId;
  const sec = document.getElementById('log-section');
  sec.classList.remove('hidden');
  document.getElementById('log-title').textContent = title;
  document.getElementById('log-output').innerHTML = '';
  document.getElementById('log-spinner').classList.add('animate-pulse');
  document.getElementById('cancel-btn').disabled = false;

  if (currentEvt) currentEvt.close();
  currentEvt = new EventSource(`/api/stream/${jobId}`);
  currentEvt.onmessage = (e) => {
    const line = e.data;
    if (line.startsWith('__DONE__')) {
      const rc = parseInt(line.replace('__DONE__',''));
      appendLog(rc === 0 ? '✓ Completed successfully' : `✗ Finished with errors (exit ${rc})`,
                rc === 0 ? 'done' : 'error');
      document.getElementById('log-spinner').classList.remove('animate-pulse');
      document.getElementById('log-spinner').style.background = rc===0 ? '#4ade80' : '#f87171';
      document.getElementById('log-title').textContent = rc===0 ? 'Done ✓' : 'Finished with errors';
      document.getElementById('cancel-btn').disabled = true;
      currentEvt.close();
      loadOutputs('output');
    } else {
      appendLog(line, classifyLog(line));
    }
  };
  currentEvt.onerror = () => {
    appendLog('[connection lost]', 'error');
    currentEvt.close();
  };
}

// ── transcript run ───────────────────────────────────────────────────────── //
async function runTranscript() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) { alert('Please enter a URL'); return; }
  const payload = {
    mode: 'transcript',
    url,
    single_video: document.getElementById('t-target').value === 'video',
    language: document.getElementById('t-lang').value,
    browser: document.getElementById('t-browser').value,
    screenshots: document.getElementById('t-screenshots').checked,
    scene_threshold: parseFloat(document.getElementById('t-threshold').value),
    no_whisper: document.getElementById('t-no-whisper').checked,
    whisper_model: document.getElementById('t-whisper-model').value,
  };
  const res = await fetch('/api/run', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
  const data = await res.json();
  if (data.error) { alert(data.error); return; }
  startStream(data.job_id, `Archiving${payload.single_video?' video':' channel'}…`);
}

// ── playlist fetch ───────────────────────────────────────────────────────── //
async function fetchPlaylists() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) { alert('Enter a channel URL first'); return; }
  const btn = event.currentTarget;
  btn.textContent = '⏳ Fetching…';
  btn.disabled = true;
  const res = await fetch('/api/run', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({mode:'playlists', url, browser: document.getElementById('d-browser').value})
  });
  const data = await res.json();
  btn.textContent = '🔍 Fetch Playlists from Channel';
  btn.disabled = false;
  if (data.error) { alert(data.error); return; }
  fetchedPlaylists = data.playlists || [];
  renderInlinePlaylists();
}

function renderInlinePlaylists() {
  const box = document.getElementById('d-playlist-list');
  box.innerHTML = '';
  box.classList.remove('hidden');
  fetchedPlaylists.forEach((pl, i) => {
    const id = `pl-${i}`;
    const row = document.createElement('label');
    row.className = 'flex items-center gap-3 p-2.5 rounded-lg cursor-pointer hover:bg-[#1e2235] transition-colors';
    row.innerHTML = `
      <input type="checkbox" id="${id}" data-idx="${i}" checked
        class="w-4 h-4 accent-indigo-500 rounded"/>
      <span class="text-sm text-slate-300 flex-1">${pl.title}</span>`;
    box.appendChild(row);
  });
}

// ── download run ─────────────────────────────────────────────────────────── //
async function runDownload() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) { alert('Enter a URL'); return; }
  const target = document.getElementById('d-target').value;
  const browser = document.getElementById('d-browser').value;
  const fmt = document.getElementById('d-format').value;
  const quality = document.getElementById('d-quality').value || null;

  if (target === 'video') {
    const payload = {mode:'download', url, single_video:true, browser, format:fmt, quality};
    const res = await fetch('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data = await res.json();
    if (data.error){alert(data.error);return;}
    startStream(data.job_id, 'Downloading video…');
    return;
  }

  if (target === 'playlist') {
    const payload = {mode:'download_playlist', playlist_url:url, browser, format:fmt, quality};
    const res = await fetch('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data = await res.json();
    if(data.error){alert(data.error);return;}
    startStream(data.job_id, 'Downloading playlist…');
    return;
  }

  // channel — get selected playlists
  const checkboxes = document.querySelectorAll('#d-playlist-list input[type=checkbox]');
  const selected = [];
  checkboxes.forEach(cb => { if(cb.checked) selected.push(fetchedPlaylists[parseInt(cb.dataset.idx)]); });
  if (!selected.length) { alert('Select at least one playlist'); return; }

  // Download sequentially — fire first job
  await downloadNextPlaylist(selected, 0, browser, fmt, quality);
}

async function downloadNextPlaylist(list, idx, browser, fmt, quality) {
  if (idx >= list.length) return;
  const pl = list[idx];
  const payload = {mode:'download_playlist', playlist_url: pl.url, browser, format:fmt, quality};
  const res = await fetch('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  const data = await res.json();
  if(data.error){alert(data.error);return;}
  const remaining = list.length - idx;
  startStream(data.job_id, `Downloading: ${pl.title} (${remaining} left)`);
  // Chain next playlist after this one completes
  const origHandler = currentEvt.onmessage;
  currentEvt.onmessage = async (e) => {
    origHandler(e);
    if (e.data.startsWith('__DONE__')) {
      await new Promise(r => setTimeout(r, 800));
      await downloadNextPlaylist(list, idx+1, browser, fmt, quality);
    }
  };
}

// ── cancel ───────────────────────────────────────────────────────────────── //
async function cancelJob() {
  if (!currentJobId) return;
  await fetch(`/api/cancel/${currentJobId}`, {method:'POST'});
  if (currentEvt) currentEvt.close();
  appendLog('⏹ Cancelled by user', 'warn');
  document.getElementById('cancel-btn').disabled = true;
}

// ── outputs browser ──────────────────────────────────────────────────────── //
function showTab(t) {
  document.getElementById('outputs-section').classList.remove('hidden');
  loadOutputs('output');
}

async function loadOutputs(root) {
  const res = await fetch(`/api/outputs?root=${root}`);
  const files = await res.json();
  const box = document.getElementById('outputs-list');
  document.getElementById('outputs-section').classList.remove('hidden');
  if (!files.length) {
    box.innerHTML = '<div class="px-5 py-8 text-center text-slate-500 text-sm">No files yet</div>';
    return;
  }
  box.innerHTML = files.map(f => {
    const ext = f.name.split('.').pop().toLowerCase();
    const pillCls = ext==='md'?'pill-md':ext==='jpg'||ext==='jpeg'||ext==='png'?'pill-jpg':
                    ext==='mp4'?'pill-mp4':ext==='mp3'?'pill-mp3':'bg-slate-700 text-slate-300';
    const size = f.size > 1048576 ? (f.size/1048576).toFixed(1)+'MB' :
                 f.size > 1024 ? (f.size/1024).toFixed(0)+'KB' : f.size+'B';
    const previewBtn = (ext==='jpg'||ext==='jpeg'||ext==='png')
      ? `<button onclick="previewImg('${f.path}')" class="text-xs text-slate-400 hover:text-white px-2">👁</button>` : '';
    return `<div class="file-row flex items-center gap-3 px-5 py-2.5 transition-colors">
      <span class="pill ${pillCls}">${ext}</span>
      <span class="text-sm text-slate-300 flex-1 truncate" title="${f.path}">${f.name}</span>
      <span class="text-xs text-slate-500 shrink-0">${size}</span>
      ${previewBtn}
      <a href="/api/file?path=${encodeURIComponent(f.path)}"
        class="text-xs btn-secondary px-2.5 py-1 rounded-lg text-slate-300 hover:text-white shrink-0">↓</a>
    </div>`;
  }).join('');
}

// ── image preview ────────────────────────────────────────────────────────── //
function previewImg(path) {
  const modal = document.createElement('div');
  modal.className = 'fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 cursor-pointer';
  modal.onclick = () => modal.remove();
  modal.innerHTML = `<img src="/api/view?path=${encodeURIComponent(path)}"
    class="max-w-full max-h-full rounded-xl shadow-2xl object-contain"/>`;
  document.body.appendChild(modal);
}
</script>
</body>
</html>
